name: Release

on:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  build:
    name: Build static binary (Linux x86_64)
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust + musl target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl

      - name: Install musl tools
        run: sudo apt-get install -y musl-tools

      - name: Build static binary
        run: |
          cd daemon
          cargo build --release --target x86_64-unknown-linux-musl
          ls -lh target/x86_64-unknown-linux-musl/release/strontium
          cp target/x86_64-unknown-linux-musl/release/strontium ../strontium-linux-x86_64
          ls -lh ../strontium-linux-x86_64
          file ../strontium-linux-x86_64

      - name: Get version
        id: version
        run: |
          VERSION=$(grep '^version' daemon/Cargo.toml | head -1 | cut -d'"' -f2)
          SHORT_SHA=$(echo $GITHUB_SHA | cut -c1-7)
          echo "tag=v${VERSION}-${SHORT_SHA}" >> $GITHUB_OUTPUT
          echo "name=X1 Strontium v${VERSION} (${SHORT_SHA})" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.name }}
          body: Decentralized time oracle for X1 blockchain. Static binary for all Linux x86_64 distributions.
          files: strontium-linux-x86_64
          make_latest: true
