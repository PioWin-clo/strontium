name: Release

on:
  push:
    branches: [ main ]
    paths:
      - 'src/**'
      - 'daemon/**'

jobs:
  build:
    name: Build static binary (Linux x86_64)
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust + musl target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl

      - name: Install musl tools
        run: sudo apt-get install -y musl-tools

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            daemon/target
          key: ${{ runner.os }}-musl-${{ hashFiles('daemon/Cargo.lock') }}

      - name: Build static binary
        run: |
          cd daemon
          cargo build --release --target x86_64-unknown-linux-musl
          strip target/x86_64-unknown-linux-musl/release/strontium

      - name: Verify binary
        run: |
          file daemon/target/x86_64-unknown-linux-musl/release/strontium
          ldd daemon/target/x86_64-unknown-linux-musl/release/strontium || true

      - name: Get version
        id: version
        run: |
          VERSION=$(grep '^version' daemon/Cargo.toml | head -1 | cut -d'"' -f2)
          SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
          echo "tag=v${VERSION}-${SHORT_SHA}" >> $GITHUB_OUTPUT
          echo "name=X1 Strontium v${VERSION} (${SHORT_SHA})" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.name }}
          body: |
            ## X1 Strontium — Decentralized Time Oracle

            **Static binary — works on all Linux x86_64:**
            Ubuntu 18.04 / 20.04 / 22.04 / 24.04 · Debian · CentOS · Any Linux

            ### Quick install
```bash
            wget https://github.com/PioWin-clo/strontium/releases/latest/download/strontium-linux-x86_64
            chmod +x strontium-linux-x86_64
            sudo mv strontium-linux-x86_64 /usr/local/bin/strontium
            sudo ln -sf /usr/local/bin/strontium /usr/local/bin/x1sr
            x1sr --help
```
          files: daemon/target/x86_64-unknown-linux-musl/release/strontium:strontium-linux-x86_64
          make_latest: true
